<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — Playa Azul | DestinationPick</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Manrope:wght@300;400;500;600;700;800&family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ivory:#FFFAF0;--cream:#F7F0E4;--teal:#628487;--teal-d:#4C6A6D;
  --teal-dd:#2E4546;--teal-bg:#1B3234;--pink:#F3CDD5;--pink-d:#E2A6B1;
  --gold:#C8A86B;--gold-l:#E6D5A8;--ink:#1E1E1E;--muted:#6B6B6B;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'Manrope',system-ui,sans-serif;
  --script:'Dancing Script',cursive;
}
html{scroll-behavior:smooth}
body{
  font-family:var(--sans);background:var(--ivory);color:var(--ink);
  overflow-x:hidden;min-height:100vh;display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}

.thank-wrap{
  position:relative;width:100%;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem;
  overflow:hidden;
}
.thank-bg{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:0.2;
}
.thank-scrim{
  position:absolute;inset:0;z-index:1;
  background:linear-gradient(to bottom,rgba(27,50,52,0.6),rgba(27,50,52,0.85));
}
.thank-card{
  position:relative;z-index:2;text-align:center;max-width:580px;
  background:rgba(255,250,240,0.95);
  border:1px solid rgba(200,168,107,0.3);border-radius:18px;
  padding:4rem 3rem;box-shadow:0 20px 60px rgba(0,0,0,0.15);
}
.thank-icon{
  font-size:3rem;margin-bottom:1rem;animation:bounceIn 0.6s ease;
}
@keyframes bounceIn{
  0%{transform:scale(0.3);opacity:0}
  50%{transform:scale(1.1)}
  100%{transform:scale(1);opacity:1}
}
.thank-title{
  font-family:var(--serif);font-size:clamp(2rem,5vw,3rem);
  font-weight:600;color:var(--teal-dd);margin-bottom:0.5rem;line-height:1.15;
}
.thank-title em{
  font-family:var(--script);font-style:normal;font-weight:600;color:var(--gold);
}
.thank-line{
  width:60px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:1.5rem auto;
}
.thank-body{
  font-size:0.95rem;color:var(--muted);line-height:1.8;margin-bottom:1.5rem;
}
.thank-body strong{color:var(--teal-dd);font-weight:600}
.thank-note{
  font-size:0.85rem;color:var(--muted);font-style:italic;margin-bottom:2rem;
}
.thank-btn{
  display:inline-block;font-family:var(--sans);font-size:.72rem;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;padding:.9rem 2.2rem;
  background:var(--teal);color:#fff;border-radius:100px;
  transition:background .22s,transform .2s;
}
.thank-btn:hover{background:var(--teal-d);transform:translateY(-2px)}
.thank-footer{
  margin-top:2.5rem;padding-top:1.5rem;
  border-top:1px solid rgba(200,168,107,0.2);
  font-size:0.6rem;font-weight:500;letter-spacing:.08em;color:var(--muted);
}
@media(max-width:600px){.thank-card{padding:3rem 1.5rem;border-radius:14px}}
  </style>
</head>
<body>

<div class="thank-wrap">
  <img class="thank-bg" src="images/banner.jpg.jpg" alt="Playa Azul">
  <div class="thank-scrim"></div>
  <div class="thank-card">
    <div class="thank-icon">🪔</div>
    <h1 class="thank-title">Thank <em>You!</em></h1>
    <div class="thank-line"></div>
    <p class="thank-body">
      We've received your inquiry successfully.<br><br>
      Your South Asian wedding specialist will be in touch within <strong>24 hours</strong> with personalised availability, pricing, and a welcome packet.
    </p>
    <p class="thank-note">We can't wait to help you celebrate at Playa Azul.</p>
    <a href="index.html" class="thank-btn">Back to Home</a>
    <div class="thank-footer">Playa Azul × DestinationPick</div>
  </div>
</div>

</body>
</html>
